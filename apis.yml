aid: videosdk
name: VideoSDK
description: Real-time voice, video, and AI agent platform for developers. VideoSDK
  provides REST and WebSocket APIs for building video conferencing, live streaming,
  interactive broadcast applications, and real-time AI agent integrations with SDKs
  for JavaScript, React, Flutter, React Native, Android, and iOS.
